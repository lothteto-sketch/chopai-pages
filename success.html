<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chop AI Pro — Paiement réussi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFF8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 12px; line-height: 1.3; }
    p { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 12px; }
    .badge {
      display: inline-block;
      background: #2D7A3A;
      color: white;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      width: 100%;
      background: #E8501A;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .btn:active { opacity: 0.85; }
    .hint { font-size: 12px; color: #bbb; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>Paiement réussi !<br>Bienvenue dans Chop AI Pro</h1>
    <p>Ton abonnement est actif. Profite de toutes les fonctionnalités premium 🦁</p>
    <div class="badge">👑 CHOP AI PRO ACTIVÉ</div>
    <button class="btn" onclick="closeAndReturn()">
      Revenir dans l'application
    </button>
    <p class="hint">Cliquez sur ce bouton pour revenir dans l'application.</p>
  </div>
  <script>
    function closeAndReturn() {
      window.close()
      setTimeout(function() {
        window.history.back()
      }, 200)
    }
  </script>
</body>
</html>
